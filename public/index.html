<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fbf3e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Kiln Journal</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="boot-screen" class="boot-screen">
  <span class="boot-icon">🔥</span>
  <span class="boot-title">Kiln Journal</span>
  <span class="boot-status" id="boot-status">Warming up…</span>
  <div class="boot-bar-track">
    <div class="boot-bar" id="boot-bar" style="width:20%"></div>
  </div>
</div>

<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-inner">
    <h1 class="auth-heading">Kiln<br><em>Journal.</em></h1>
    <p class="auth-sub">Track every firing. Learn from each one.</p>
    <button id="sign-in-btn" class="btn-primary">Sign in with Google</button>
  </div>
</div>

<div id="app" class="app hidden">
  <main id="screen-root" class="screen-root"></main>
  <nav class="tab-nav">
    <button class="tab-btn" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      <span>Today</span>
    </button>
    <button class="tab-btn" data-tab="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <span>Log</span>
    </button>
    <button class="tab-fab" id="fab-btn" aria-label="Start firing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
    <button class="tab-btn" data-tab="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Library</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span>Kiln</span>
    </button>
  </nav>
</div>

<div id="flow-root" class="flow-root hidden"></div>

<!-- Firebase compat SDK (local) -->
<script src="/firebase-app-compat.js"></script>
<script src="/firebase-auth-compat.js"></script>
<script src="/firebase-firestore-compat.js"></script>

<!-- App entry point (module = deferred automatically) -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
